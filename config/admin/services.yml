imports:
  - { resource: ../common.yml }

services:
  _defaults:
    public: true
    autowire: true
    autoconfigure: true

  # Controllers
  PrestaShop\Module\Newsman\Controller\Admin\ConfigurationController: ~
  PrestaShop\Module\Newsman\Controller\Admin\OauthLoginController: ~
  PrestaShop\Module\Newsman\Controller\Admin\OauthCallbackController: ~
  PrestaShop\Module\Newsman\Controller\Admin\OauthSaveListController: ~
  PrestaShop\Module\Newsman\Controller\Admin\LogViewerController: ~

  # Event subscribers
  PrestaShop\Module\Newsman\EventSubscriber\AdminEmailsubscriptionSubscriber:
    tags:
      - { name: kernel.event_subscriber }

  # Form type (inherits translator + locales from parent)
  PrestaShop\Module\Newsman\Form\ConfigurationType:
    class: PrestaShop\Module\Newsman\Form\ConfigurationType
    parent: 'form.type.translatable.aware'
    autowire: true
    public: true
    tags: ['form.type']

  # Data configuration (extends AbstractMultistoreConfiguration)
  PrestaShop\Module\Newsman\Form\ConfigurationDataConfiguration:
    arguments:
      - '@prestashop.adapter.legacy.configuration'
      - '@PrestaShop\PrestaShop\Adapter\Shop\Context'
      - '@prestashop.adapter.multistore_feature'
      - '@PrestaShop\Module\Newsman\Logger'
      - '@PrestaShop\Module\Newsman\Service\Configuration\Integration\SaveListIntegrationSetup'
      - '@PrestaShop\Module\Newsman\Service\Configuration\Remarketing\GetSettings'
      - '@PrestaShop\Module\Newsman\Util\ServerIpResolver'
      - '@PrestaShop\Module\Newsman\Config'

  # Form data provider (wraps DataConfiguration)
  newsman.form.configuration_data_provider:
    class: PrestaShop\Module\Newsman\Form\ConfigurationFormDataProvider
    arguments:
      - '@PrestaShop\Module\Newsman\Form\ConfigurationDataConfiguration'

  # Form handler (PrestaShop core)
  newsman.form.configuration_handler:
    class: 'PrestaShop\PrestaShop\Core\Form\Handler'
    arguments:
      - '@form.factory'
      - '@prestashop.core.hook.dispatcher'
      - '@newsman.form.configuration_data_provider'
      - 'PrestaShop\Module\Newsman\Form\ConfigurationType'
      - 'NewsmanConfiguration'
